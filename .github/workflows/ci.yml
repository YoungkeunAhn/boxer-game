name: CI

# PR과 main 푸시에서 전체 검증 게이트(check.mjs full)를 돌린다.
# 이 잡이 통과해야만 PR을 머지할 수 있도록 브랜치 보호 규칙과 함께 쓴다.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 같은 브랜치에서 새 푸시가 오면 진행 중인 검증을 취소해 러너 시간을 아낀다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 전체 검증 게이트
        run: node tools/check.mjs full
